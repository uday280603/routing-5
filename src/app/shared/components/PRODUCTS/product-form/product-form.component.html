<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <mat-card class="p-3 shadow">
        <h3 class="text-center mb-3">Create Product</h3>
        <form [formGroup]="productForm" (ngSubmit)="onAddProduct()">
          <div class="mb-3">
            <input
              class="form-control"
              placeholder="Name"
              formControlName="name"
            />
          </div>
          <div class="mb-3">
            <input
              class="form-control"
              placeholder="Price"
              formControlName="price"
            />
          </div>
          <div class="mb-3">
            <input
              class="form-control"
              placeholder="Image URL"
              formControlName="image"
            />
          </div>
          <div class="mb-3">
            <textarea
              class="form-control"
              placeholder="Description"
              formControlName="description"
            ></textarea>
          </div>
          <button class="w-100" *ngIf="!isInEditMode" mat-raised-button color="primary" type="submit">Add Product</button>
          <button class="w-100" *ngIf="isInEditMode" mat-raised-button color="warn" type="button" (click)="onUpdate()">Update</button>
        </form>
      </mat-card>
    </div>
  </div>
</div>
