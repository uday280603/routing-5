<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-body">
          <form [formGroup]="userForm" (ngSubmit)="onAddUser()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="firstName"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="lastName"
                />
              </div>
              <div class="col-md-12 mb-3">
                <label class="form-label">Image URL</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="imageUrl"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  formControlName="email"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Phone</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="phone"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Date Of Birth</label>
                <input
                  type="date"
                  class="form-control"
                  formControlName="dateOfBirth"
                />
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label">Gender</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="gender"
                />
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label">Blood Group</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="bloodGroup"
                />
              </div>
            </div>
            <hr />
            <h5>Address</h5>
            <div class="row" formGroupName="address">
              <div class="col-md-6 mb-3">
                <label class="form-label">Street</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="street"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">City</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="city"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">State</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="state"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Pincode</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="pincode"
                />
              </div>
            </div>
            <hr />
            <h5>Skills</h5>
            <div class="row d-flex justify-content-end mb-3">
              <button mat-raised-button color="primary" type="button" (click)="onAddSkill()">
                Add Skill
              </button>
            </div>
            <div formArrayName="skills">
                
               <div class="row"  *ngFor="let skill of skillArray.controls; let i = index">
              <div
                class="col-md-10 mb-3"
              >
                <input
                  type="text"
                  class="form-control"
                  placeholder="Skill 1"
                  [formControlName]="i"
                />
              </div>
              <div class="col-md-2">
                <button mat-raised-button color="warn" type="button" (click)="onRemove(i)">Remove</button>
              </div>
            </div>

            </div>
           
            <div class="card-footer">
              <button
                *ngIf="!isInEditMode"
                mat-raised-button
                color="primary"
                type="submit"
                class="w-100"
              >
                Add User
              </button>
              <button
              (click)="onUpdate()"
                *ngIf="isInEditMode"
                mat-raised-button
                color="accent"
                type="button"
                class="w-100"
              >
                Update User
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
